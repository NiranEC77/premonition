<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #f9f9f7; }
    .mark { fill: #2a78d6; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d0d0d; }
      .mark { fill: #3987e5; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="7" />
  <!-- two bold bars, gapping up — simplified from a literal candlestick so it
       still reads clearly at 16px, where thin wick details just blur away -->
  <rect class="mark" x="9" y="14" width="6" height="12" rx="2" />
  <rect class="mark" x="18" y="6" width="6" height="20" rx="2" />
</svg>
